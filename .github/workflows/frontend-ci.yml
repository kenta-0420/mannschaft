# =============================================================================
# Frontend CI — pull_request to main
# =============================================================================
# Runs install on every PR targeting main to validate package-lock.json.
# No AWS credentials required — build and deploy are intentionally omitted.
# Note: lint and typecheck are omitted until pre-existing errors are resolved
#       in a dedicated cleanup task.
# =============================================================================

name: Frontend — CI (PR Check)

on:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  build:
    name: Install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
