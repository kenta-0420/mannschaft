spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: none

mannschaft:
  jwt:
    secret: test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256-algorithm
    access-token-expiration: 900
    refresh-token-expiration: 604800
  encryption:
    key: dGVzdC1lbmNyeXB0aW9uLWtleS0xMjM0NTY3ODkwYWI=
    hmac-key: dGVzdC1obWFjLWtleS0tLTEyMzQ1Njc4OTBhYmNkZWY=
  storage:
    type: local
  # F13.1 Phase 13.1.2: QR 署名 — テスト決定性のために固定 secret を使用
  # src/main/resources/application-test.yml と同一値（src/test/ が優先されるため同期必須）
  jobs:
    qr:
      ttl-seconds: 60
      ttl-seconds-max: 300
      rotation-advance-seconds: 5
      short-code-length: 6
      anomaly-distance-meters: 500
      signing-keys:
        - kid: v1
          secret: test-qr-signing-key-fixed-32bytes-testingxxxx
          active: true
