<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="/css/pdf-common.css"/>
</head>
<body>
    <div class="pdf-header">
        <img th:if="${logoBase64}" th:src="'data:image/png;base64,' + ${logoBase64}" class="logo"/>
        <h1 th:text="${title}">順位表</h1>
    </div>
    <div class="pdf-body">
        <table>
            <thead>
                <tr>
                    <th class="text-center">順位</th>
                    <th>チーム名</th>
                    <th class="text-center">試合数</th>
                    <th class="text-center">勝</th>
                    <th class="text-center">負</th>
                    <th class="text-center">引分</th>
                    <th class="text-center">勝点</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${standings}">
                    <td class="text-center" th:text="${entry.rank}">1</td>
                    <td th:text="${entry.teamName}">チーム名</td>
                    <td class="text-center" th:text="${entry.played}">0</td>
                    <td class="text-center" th:text="${entry.won}">0</td>
                    <td class="text-center" th:text="${entry.lost}">0</td>
                    <td class="text-center" th:text="${entry.drawn}">0</td>
                    <td class="text-center" th:text="${entry.points}">0</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="pdf-footer">
        <span th:if="${customFooter}" th:text="${customFooter}"></span>
    </div>
</body>
</html>
