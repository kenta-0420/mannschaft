<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="/css/pdf-common.css"/>
    <style>
        .invite-brand {
            text-align: center;
            font-size: 36pt;
            font-weight: bold;
            color: #3B82F6;
            margin-top: 20mm;
            letter-spacing: 4px;
        }
        .invite-message-box {
            text-align: center;
            margin: 10mm 10mm 8mm 10mm;
            padding: 8mm;
            border: 2px solid #3B82F6;
            /* border-radius は Flying Saucer (CSS2.1) 非対応のため使用しない */
        }
        .invite-message-prefix {
            font-size: 18pt;
            font-weight: bold;
            color: #333;
        }
        .invite-team-name {
            font-size: 28pt;
            font-weight: bold;
            color: #3B82F6;
            margin-top: 4mm;
        }
        .invite-qr-container {
            text-align: center;
            margin: 8mm auto;
        }
        .invite-qr-container img {
            width: 350px;
            height: 350px;
        }
        .invite-instruction {
            text-align: center;
            font-size: 12pt;
            color: #555;
            margin: 6mm 15mm;
        }
        .invite-meta {
            text-align: center;
            font-size: 10pt;
            color: #777;
            margin: 4mm 15mm;
            padding-top: 4mm;
            border-top: 1px solid #ddd;
        }
        .invite-footer {
            text-align: center;
            font-size: 9pt;
            color: #999;
            margin-top: 10mm;
        }
        .invite-invalid-banner {
            text-align: center;
            color: #dc2626;
            font-size: 12pt;
            font-weight: bold;
            margin: 4mm 0;
        }
    </style>
</head>
<body>
    <div class="invite-brand">Mannschaft</div>

    <div class="invite-message-box">
        <div class="invite-message-prefix">Mannschaft始めました。</div>
        <div class="invite-team-name" th:text="${teamName}">チーム名</div>
    </div>

    <!-- 無効・期限切れ警告 -->
    <div class="invite-invalid-banner" th:if="${isRevoked}">
        ※ このQRコードは無効化されています
    </div>
    <div class="invite-invalid-banner" th:if="${isExpired and !isRevoked}">
        ※ このQRコードは有効期限を過ぎています
    </div>

    <div class="invite-qr-container">
        <img th:src="'data:image/png;base64,' + ${qrBase64}" alt="招待QRコード"/>
    </div>

    <div class="invite-instruction">
        このQRコードをスキャンしてチームに参加してください。
    </div>

    <div class="invite-meta">
        <span th:if="${expiresAt != null}">
            有効期限: <span th:text="${#temporals.format(expiresAt, 'yyyy年MM月dd日 HH:mm')}"></span>
        </span>
        <span th:if="${maxUses != null}">
            最大利用回数: <span th:text="${maxUses}"></span>回
            （使用済み: <span th:text="${usedCount}"></span>回）
        </span>
    </div>

    <div class="invite-footer">Powered by Mannschaft</div>
</body>
</html>
