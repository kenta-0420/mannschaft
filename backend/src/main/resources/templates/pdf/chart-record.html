<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="/css/pdf-common.css"/>
</head>
<body>
    <div class="pdf-header">
        <img th:if="${logoBase64}" th:src="'data:image/png;base64,' + ${logoBase64}" class="logo"/>
        <h1 th:text="${title}">カルテ</h1>
    </div>
    <div class="pdf-body">
        <table class="no-border">
            <tr>
                <td><strong>顧客名:</strong> <span th:text="${chart.customerName}">名前</span> 様</td>
                <td><strong>来院日:</strong> <span th:text="${#temporals.format(chart.visitDate, 'yyyy年MM月dd日')}">日付</span></td>
            </tr>
        </table>

        <div class="mt-10">
            <h3>施術内容</h3>
            <p th:text="${chart.treatmentContent}">施術内容</p>
        </div>

        <div class="mt-10" th:if="${chart.notes}">
            <h3>備考</h3>
            <p th:text="${chart.notes}">備考</p>
        </div>

        <!-- 写真はS3のPre-signed URLで提供されるため、PDFへの直接埋め込みには
             サーバー側でバイト取得→Base64変換が必要。現段階ではファイル名リストのみ表示。
             TODO: PDF用に写真をBase64変換してテンプレート変数に渡す処理をServiceに追加 -->
        <div class="mt-10" th:if="${not #lists.isEmpty(photos)}">
            <h3>写真記録</h3>
            <table>
                <thead><tr><th>ファイル名</th><th>種別</th><th>メモ</th></tr></thead>
                <tbody>
                    <tr th:each="photo : ${photos}">
                        <td th:text="${photo.originalFilename}">photo.jpg</td>
                        <td th:text="${photo.photoType}">BEFORE</td>
                        <td th:text="${photo.note}">-</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="pdf-footer">
        <span th:if="${customFooter}" th:text="${customFooter}"></span>
    </div>
</body>
</html>
