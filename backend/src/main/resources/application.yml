spring:
  application:
    name: mannschaft

  # デフォルトプロファイル（明示指定がない場合は local）
  profiles:
    default: local

  # Virtual Threads（Java 21）
  threads:
    virtual:
      enabled: true

  # JPA / Hibernate（共通設定。環境依存は各プロファイルで上書き）
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true

  # Jackson — ISO 8601 文字列で出力（.claudecode.md §20）
  jackson:
    serialization:
      write-dates-as-timestamps: false

  # i18n メッセージソース（F11.3）
  messages:
    basename: messages,ValidationMessages
    encoding: UTF-8
    fallback-to-system-locale: false
    use-code-as-default-message: false

# Server
server:
  port: 8080

# JWT（アプリ固有設定。本番は環境変数で上書き）
mannschaft:
  jwt:
    secret: ${MANNSCHAFT_JWT_SECRET:dev-secret-key-change-in-production-minimum-256-bits-long}
    access-token-expiration: ${MANNSCHAFT_JWT_ACCESS_EXPIRATION:900}
    refresh-token-expiration: ${MANNSCHAFT_JWT_REFRESH_EXPIRATION:604800}
  encryption:
    key: ${MANNSCHAFT_ENCRYPTION_KEY:}
    hmac-key: ${MANNSCHAFT_HMAC_KEY:}
  storage:
    bucket: ${MANNSCHAFT_R2_BUCKET:mannschaft-storage}
    endpoint: ${MANNSCHAFT_R2_ENDPOINT:}        # https://{accountId}.r2.cloudflarestorage.com
    access-key: ${MANNSCHAFT_R2_ACCESS_KEY:}
    secret-key: ${MANNSCHAFT_R2_SECRET_KEY:}
    presigned-upload-ttl: ${MANNSCHAFT_R2_UPLOAD_TTL:600}
    presigned-download-ttl: ${MANNSCHAFT_R2_DOWNLOAD_TTL:3600}
  cdn:
    workers-domain: ${MANNSCHAFT_CDN_WORKERS_DOMAIN:}  # 例: cdn.example.workers.dev
    enabled: ${MANNSCHAFT_CDN_ENABLED:false}
  ses:
    region: ${MANNSCHAFT_SES_REGION:ap-northeast-1}
    endpoint: ${MANNSCHAFT_SES_ENDPOINT:}
  webauthn:
    origin: ${MANNSCHAFT_WEBAUTHN_ORIGIN:https://mannschaft.app}
  google:
    client-id: ${MANNSCHAFT_GOOGLE_CLIENT_ID:}
    client-secret: ${MANNSCHAFT_GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    revoke-uri: https://oauth2.googleapis.com/revoke
    calendar-api-base: https://www.googleapis.com/calendar/v3
    userinfo-uri: https://www.googleapis.com/oauth2/v3/userinfo
    redirect-uri: ${MANNSCHAFT_GOOGLE_REDIRECT_URI:https://app.mannschaft.com/auth/oauth/callback/google}
    places-api-key: ${MANNSCHAFT_GOOGLE_PLACES_API_KEY:}
    places-api-base: https://places.googleapis.com/v1
  line:
    client-id: ${MANNSCHAFT_LINE_CLIENT_ID:}
    client-secret: ${MANNSCHAFT_LINE_CLIENT_SECRET:}
    token-uri: https://api.line.me/oauth2/v2.1/token
    profile-uri: https://api.line.me/v2/profile
    redirect-uri: ${MANNSCHAFT_LINE_REDIRECT_URI:https://app.mannschaft.com/auth/oauth/callback/line}
  apple:
    client-id: ${MANNSCHAFT_APPLE_CLIENT_ID:}
    client-secret: ${MANNSCHAFT_APPLE_CLIENT_SECRET:}
    token-uri: https://appleid.apple.com/auth/token
    redirect-uri: ${MANNSCHAFT_APPLE_REDIRECT_URI:https://app.mannschaft.com/auth/oauth/callback/apple}
  stripe:
    secret-key: ${MANNSCHAFT_STRIPE_SECRET_KEY:}
    connect:
      return-url: ${MANNSCHAFT_STRIPE_CONNECT_RETURN_URL:https://app.mannschaft.com/settings/stripe/return}
      refresh-url: ${MANNSCHAFT_STRIPE_CONNECT_REFRESH_URL:https://app.mannschaft.com/settings/stripe/refresh}
  # F13.1 Phase 13.1.2: QR チェックイン／アウト トークン署名設定（設計書 §2.3.1 / §10.10）
  # 本番は JOB_QR_SIGNING_SECRET を必ず設定（256bit 以上）。未設定だと起動失敗。
  jobs:
    qr:
      ttl-seconds: 60
      ttl-seconds-max: 300
      rotation-advance-seconds: 5
      short-code-length: 6
      signing-keys:
        - kid: ${JOB_QR_SIGNING_KID:v1}
          secret: ${JOB_QR_SIGNING_SECRET:}
          active: true

# 備品ランキング集計バッチ設定（F09.12）
equipment:
  ranking:
    cron: "0 0 3 * * *"
    min-team-count: 5
    score-weight-team: 3.0
    score-weight-consume: 1.0
    top-n-per-category: 20

# F03.12 ケア対象者2段階不在アラートバッチ設定
care:
  absent-alert:
    enabled: true
