spring:
  # Testcontainers が自動で MySQL を起動するため DataSource は不要
  datasource:
    url: jdbc:tc:mysql:8.0:///mannschaft?serverTimezone=Asia/Tokyo
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        # F00 §13.4: 性能テスト用 SQL 意図カウンタ。テーブル名ベースで発行 SQL 数を集計する
        session_factory:
          statement_inspector: com.mannschaft.app.common.visibility.perf.SqlIntentCounter

  flyway:
    enabled: true

# F08.7 Phase 9-α: テスト環境ではシフト予算機能を有効化
feature:
  shift-budget:
    enabled: true

mannschaft:
  # F13.1 Phase 13.1.2: QR 署名 — テスト決定性のために固定 secret を使用
  jobs:
    qr:
      ttl-seconds: 60
      ttl-seconds-max: 300
      rotation-advance-seconds: 5
      short-code-length: 6
      signing-keys:
        - kid: v1
          secret: test-qr-signing-key-fixed-32bytes-testingxxxx
          active: true
