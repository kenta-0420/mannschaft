spring:
  # Testcontainers が自動で MySQL を起動するため DataSource は不要
  datasource:
    url: jdbc:tc:mysql:8.0:///mannschaft?serverTimezone=Asia/Tokyo
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

# F08.7 Phase 9-α / 9-δ: テスト環境ではシフト予算機能を有効化
# monthly-close-cron-enabled: テスト環境でも cron 自動起動は OFF（バッチは手動 API #11 から呼ぶ）
feature:
  shift-budget:
    enabled: true
    monthly-close-cron-enabled: false

mannschaft:
  # F13.1 Phase 13.1.2: QR 署名 — テスト決定性のために固定 secret を使用
  jobs:
    qr:
      ttl-seconds: 60
      ttl-seconds-max: 300
      rotation-advance-seconds: 5
      short-code-length: 6
      signing-keys:
        - kid: v1
          secret: test-qr-signing-key-fixed-32bytes-testingxxxx
          active: true
