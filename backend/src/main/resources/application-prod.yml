# 本番用プロファイル
# 全て環境変数から注入（デフォルト値なし = 未設定時は起動失敗）
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  data:
    redis:
      host: ${SPRING_REDIS_HOST}
      port: ${SPRING_REDIS_PORT:6379}

  jpa:
    show-sql: false

# F08.7 Phase 9-α / 9-δ: 本番環境はデフォルト無効（明示的に false 維持）。
# 組織毎オプトインは三値論理 (budget_configs.shift_budget_enabled) で Phase 9-δ から有効化可能。
# monthly-close-cron-enabled: 月次締めバッチの cron 自動起動は本番でも OFF（運用側で
#   FEATURE_SHIFT_BUDGET_MONTHLY_CRON_ENABLED=true を明示設定したときのみ有効化）
feature:
  shift-budget:
    enabled: ${FEATURE_SHIFT_BUDGET_ENABLED:false}
    monthly-close-cron-enabled: ${FEATURE_SHIFT_BUDGET_MONTHLY_CRON_ENABLED:false}

mannschaft:
  jwt:
    secret: ${MANNSCHAFT_JWT_SECRET}
    access-token-expiration: ${MANNSCHAFT_JWT_ACCESS_EXPIRATION:900}
    refresh-token-expiration: ${MANNSCHAFT_JWT_REFRESH_EXPIRATION:604800}
  # F13.1 Phase 13.1.2: QR 署名鍵は環境変数から必須注入（デフォルト値なし＝未設定時は起動失敗）
  jobs:
    qr:
      signing-keys:
        - kid: ${JOB_QR_SIGNING_KID:v1}
          secret: ${JOB_QR_SIGNING_SECRET}
          active: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
